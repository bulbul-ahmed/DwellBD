services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: bdflathub-api
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install --include=dev && npm run build && npx prisma generate
    startCommand: cd backend && npx prisma migrate deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: bdflathub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://bdflathub.onrender.com
      - key: BACKEND_URL
        value: https://bdflathub-api.onrender.com
      # Set these manually in Render dashboard after first deploy:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        value: bdflathub-prod
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false

  # ── Frontend Static Site ────────────────────────────────────────────────────
  - type: web
    name: bdflathub
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://bdflathub-api.onrender.com/api
      - key: VITE_FRONTEND_URL
        value: https://bdflathub.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: bdflathub-db
    databaseName: bdflathub
    user: bdflathub
    region: singapore
    plan: free
